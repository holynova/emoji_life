<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emoji 人生轨迹</title>
  <style>
    :root {
      --bg: #f6f1e8;
      --panel: rgba(255, 255, 255, 0.92);
      --line: #d8cdbf;
      --text: #222;
      --muted: #6a6258;
      --accent: #2c6e49;
      --accent-soft: #e4f0e8;
      --shadow: 0 18px 50px rgba(60, 45, 20, 0.12);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.9), transparent 28%),
        linear-gradient(180deg, #f8f5ee 0%, var(--bg) 100%);
    }

    .page {
      width: min(1400px, calc(100vw - 32px));
      margin: 28px auto 40px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 460px;
      gap: 36px;
      align-items: start;
    }

    .page > * {
      min-width: 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(125, 109, 88, 0.15);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .controls {
      padding: 24px;
      position: sticky;
      top: 18px;
      overflow: hidden;
    }

    .preview {
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.9rem, 3vw, 2.8rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .intro {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .section {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid rgba(125, 109, 88, 0.12);
    }

    .section:first-of-type {
      margin-top: 0;
      padding-top: 0;
      border-top: 0;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      font-size: 0.98rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    input,
    select,
    textarea,
    button {
      font: inherit;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(120, 105, 85, 0.18);
      background: rgba(255, 255, 255, 0.96);
      color: var(--text);
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
      line-height: 1.45;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(44, 110, 73, 0.45);
      box-shadow: 0 0 0 4px rgba(44, 110, 73, 0.12);
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(120, 105, 85, 0.14);
    }

    .checkbox input {
      width: auto;
      margin: 0;
    }

    .hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.45;
    }

    .event-list {
      display: grid;
      gap: 10px;
    }

    .event-table {
      display: grid;
      gap: 8px;
      width: 100%;
    }

    .event-head,
    .event-row {
      display: grid;
      grid-template-columns: 72px minmax(96px, 1fr) 96px 96px 96px;
      gap: 8px;
      align-items: center;
      width: 100%;
    }

    .event-head.custom,
    .event-row.custom {
      grid-template-columns: 92px 96px 96px 96px 44px;
    }

    .event-head {
      padding: 0 4px;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .event-row {
      padding: 10px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(120, 105, 85, 0.12);
      transition: background-color 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      overflow: hidden;
    }

    .event-row > * {
      min-width: 0;
    }

    .event-row.is-active {
      background: rgba(228, 240, 232, 0.82);
      border-color: rgba(44, 110, 73, 0.22);
      box-shadow: inset 0 0 0 1px rgba(44, 110, 73, 0.06);
    }

    .event-row[data-fixed-row] {
      cursor: pointer;
    }

    .event-row-name {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      min-width: 0;
    }

    .event-row-name span:last-child {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .event-row-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      width: 100%;
      height: 100%;
      cursor: pointer;
      margin: 0;
      padding: 8px 0;
      border-radius: 12px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 38px;
      height: 38px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      font-size: 1.2rem;
    }

    .event-emoji-input {
      text-align: center;
      font-size: 1.2rem;
      padding-inline: 10px;
    }

    .icon-button,
    .primary-button,
    .secondary-button {
      border: 0;
      cursor: pointer;
      transition: transform 180ms ease, opacity 180ms ease, box-shadow 180ms ease;
    }

    .icon-button:hover,
    .primary-button:hover,
    .secondary-button:hover {
      transform: translateY(-1px);
    }

    .icon-button {
      width: 38px;
      height: 38px;
      min-width: 38px;
      border-radius: 12px;
      background: rgba(34, 34, 34, 0.06);
      color: var(--text);
    }

    .event-row select,
    .event-row input[type="text"] {
      min-width: 0;
      width: 100%;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .primary-button,
    .secondary-button {
      padding: 12px 16px;
      border-radius: 14px;
      font-weight: 700;
    }

    .primary-button {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 12px 24px rgba(44, 110, 73, 0.2);
    }

    .secondary-button {
      background: rgba(34, 34, 34, 0.07);
      color: var(--text);
    }

    .emoji-bank {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .emoji-pill {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(120, 105, 85, 0.14);
      background: rgba(255, 255, 255, 0.84);
      cursor: pointer;
      font-size: 1.15rem;
      line-height: 1;
    }

    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .preview-actions {
      margin-bottom: 14px;
    }

    .preview-title {
      font-size: 1rem;
      font-weight: 700;
    }

    .status {
      color: var(--muted);
      font-size: 0.82rem;
      text-align: right;
    }

    .result-card {
      border-radius: 22px;
      padding: 22px 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(253, 252, 248, 0.95));
      border: 1px solid rgba(120, 105, 85, 0.12);
      overflow: auto;
      max-height: calc(100vh - 150px);
    }

    .timeline {
      display: grid;
      gap: 12px;
    }

    .timeline-row {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 12px;
      align-items: start;
      font-size: clamp(1rem, 1.3vw, 1.2rem);
      line-height: 1.35;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
    }

    .timeline-year {
      font-weight: 500;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .timeline-emojis {
      min-height: 1.4em;
      word-break: break-word;
      font-weight: 400;
    }

    .empty {
      padding: 20px 14px;
      border-radius: 18px;
      background: rgba(34, 34, 34, 0.04);
      color: var(--muted);
      line-height: 1.5;
    }

    .copied {
      color: var(--accent);
      font-weight: 700;
    }

    .hidden-canvas {
      position: fixed;
      left: -99999px;
      top: -99999px;
      pointer-events: none;
    }

    @media (max-width: 980px) {
      .page {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .controls {
        position: static;
      }

      .result-card {
        max-height: none;
      }
    }

    @media (max-width: 720px) {
      .page {
        width: min(100vw - 18px, 100%);
        margin: 10px auto 20px;
        gap: 14px;
      }

      .controls,
      .preview {
        padding: 18px;
        border-radius: 22px;
      }

      .grid-2,
      .event-head,
      .event-row,
      .event-head.custom,
      .event-row.custom {
        grid-template-columns: 1fr;
      }

      .timeline-row {
        grid-template-columns: 88px 1fr;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="panel controls">
      <h1>Emoji 人生轨迹</h1>
      <p class="intro">在页面里直接选年份和事件，实时生成一条极简的人生时间线。左边是年份，右边只保留 emoji。</p>

      <div class="section">
        <div class="section-title">基础设置</div>
        <div class="grid-2">
          <div>
            <label for="birthYear">出生年</label>
            <input id="birthYear" type="number" min="1950" max="2100" step="1">
          </div>
          <div>
            <label for="endYear">结束年</label>
            <input id="endYear" type="number" min="1950" max="2100" step="1">
          </div>
        </div>
        <div class="grid-2" style="margin-top: 12px;">
          <label class="checkbox">
            <input id="collapseToggle" type="checkbox">
            <span>折叠连续年份</span>
          </label>
          <label class="checkbox">
            <input id="autoRenderToggle" type="checkbox" checked>
            <span>修改后自动刷新</span>
          </label>
        </div>
        <div class="hint">默认会自动给每年加上一个成长阶段人物 emoji，例如婴儿、儿童、成人。</div>
      </div>

      <div class="section">
        <div class="section-title">固定事件</div>
        <div class="hint" style="margin-bottom: 12px;">默认已经预设了读书、毕业、工作。你只需要改年份，或者关闭不用的事件。</div>
        <div id="fixedEventList" class="event-list"></div>
      </div>

      <div class="section">
        <div class="section-title">
          <span>自定义 emoji</span>
          <button id="addCustomEventBtn" class="secondary-button" type="button">新增一条</button>
        </div>
        <div id="customEventList" class="event-list"></div>
        <div class="hint">自定义事件只填 emoji。可以设置单年，也可以设置起止年份。</div>
      </div>

      <div class="section">
        <div class="section-title">常用 emoji</div>
        <div id="emojiBank" class="emoji-bank"></div>
        <div class="hint">点击会复制到剪贴板，方便粘贴到自定义事件里。</div>
      </div>

    </section>

    <section class="panel preview">
      <div class="preview-header">
        <div>
          <div class="preview-title">结果预览</div>
        </div>
        <div id="statusText" class="status">准备中</div>
      </div>
      <div class="preview-actions">
        <div class="button-row">
          <button id="generateBtn" class="primary-button" type="button">生成时间线</button>
          <button id="copyBtn" class="secondary-button" type="button">复制纯文本</button>
          <button id="exportBtn" class="secondary-button" type="button">导出图片</button>
          <button id="resetBtn" class="secondary-button" type="button">恢复默认</button>
        </div>
      </div>
      <div id="resultCard" class="result-card">
        <div id="timeline" class="timeline"></div>
      </div>
    </section>
  </div>

  <canvas id="exportCanvas" class="hidden-canvas"></canvas>

  <script>
    const CURRENT_YEAR = new Date().getFullYear();
    const STORAGE_KEY = "emoji-life-single-file-v1";

    const fixedEventTemplates = [
      { id: "school", label: "读书", emoji: "🏫", defaultStartOffset: 6, defaultEndOffset: 18 },
      { id: "graduation", label: "毕业", emoji: "🎓", defaultStartOffset: 22, defaultEndOffset: 22 },
      { id: "work", label: "工作", emoji: "💻", defaultStartOffset: 23, defaultEndOffset: null },
      { id: "marriage", label: "结婚", emoji: "💍", defaultStartOffset: 28, defaultEndOffset: 28 },
      { id: "house", label: "买房", emoji: "🏠", defaultStartOffset: 30, defaultEndOffset: 30 },
      { id: "dog", label: "养狗", emoji: "🐶", defaultStartOffset: 31, defaultEndOffset: null },
      { id: "cat", label: "养猫", emoji: "🐱", defaultStartOffset: 32, defaultEndOffset: null },
      { id: "baby", label: "生宝宝", emoji: "👶", defaultStartOffset: 33, defaultEndOffset: 33 }
    ];

    const emojiSuggestions = [
      "👶", "🧒", "👧", "🧑", "👩", "👨", "🏫", "🎓", "📚", "💻", "💍", "🏠",
      "🚗", "🐶", "🐱", "👶", "🍼", "✈️", "🎸", "🏃", "💼", "🌱", "🎨", "📷"
    ];

    const elements = {
      birthYear: document.getElementById("birthYear"),
      endYear: document.getElementById("endYear"),
      collapseToggle: document.getElementById("collapseToggle"),
      autoRenderToggle: document.getElementById("autoRenderToggle"),
      fixedEventList: document.getElementById("fixedEventList"),
      customEventList: document.getElementById("customEventList"),
      emojiBank: document.getElementById("emojiBank"),
      timeline: document.getElementById("timeline"),
      statusText: document.getElementById("statusText"),
      generateBtn: document.getElementById("generateBtn"),
      copyBtn: document.getElementById("copyBtn"),
      exportBtn: document.getElementById("exportBtn"),
      resetBtn: document.getElementById("resetBtn"),
      addCustomEventBtn: document.getElementById("addCustomEventBtn"),
      resultCard: document.getElementById("resultCard"),
      exportCanvas: document.getElementById("exportCanvas")
    };

    let state = loadState();

    function defaultState() {
      const birthYear = 1995;
      const endYear = Math.max(CURRENT_YEAR, 2026);
      return {
        birthYear,
        endYear,
        collapse: false,
        autoRender: true,
        fixedEvents: fixedEventTemplates.map((template) => {
          const start = birthYear + template.defaultStartOffset;
          const end = template.defaultEndOffset === null ? endYear : birthYear + template.defaultEndOffset;
          return {
            id: template.id,
            enabled: template.id === "school" || template.id === "graduation" || template.id === "work",
            startYear: clampYear(start),
            endYear: clampYear(end)
          };
        }),
        customEvents: [
          { id: uid(), emoji: "📚", startYear: 2018, endYear: 2020 },
          { id: uid(), emoji: "🐶", startYear: 2025, endYear: 2026 }
        ]
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          return defaultState();
        }
        const parsed = JSON.parse(raw);
        return normalizeState(parsed);
      } catch (error) {
        return defaultState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function normalizeState(candidate) {
      const fallback = defaultState();
      const birthYear = clampYear(Number(candidate.birthYear) || fallback.birthYear);
      const endYear = clampYear(Number(candidate.endYear) || fallback.endYear);
      const rangeEnd = Math.max(birthYear, endYear);

      const fixedEvents = fixedEventTemplates.map((template, index) => {
        const source = Array.isArray(candidate.fixedEvents) ? candidate.fixedEvents[index] : null;
        const base = fallback.fixedEvents[index];
        return {
          id: template.id,
          enabled: source ? Boolean(source.enabled) : base.enabled,
          startYear: sanitizeRangeYear(source ? source.startYear : base.startYear, birthYear, rangeEnd),
          endYear: sanitizeRangeYear(source ? source.endYear : base.endYear, birthYear, rangeEnd)
        };
      });

      const customEvents = Array.isArray(candidate.customEvents)
        ? candidate.customEvents.map((item) => ({
            id: item.id || uid(),
            emoji: typeof item.emoji === "string" ? item.emoji.slice(0, 24) : "",
            startYear: sanitizeRangeYear(item.startYear, birthYear, rangeEnd),
            endYear: sanitizeRangeYear(item.endYear, birthYear, rangeEnd)
          }))
        : fallback.customEvents;

      return {
        birthYear,
        endYear: rangeEnd,
        collapse: Boolean(candidate.collapse),
        autoRender: candidate.autoRender !== false,
        fixedEvents,
        customEvents
      };
    }

    function clampYear(year) {
      return Math.min(Math.max(Number(year) || CURRENT_YEAR, 1950), CURRENT_YEAR + 30);
    }

    function sanitizeRangeYear(value, min, max) {
      const year = clampYear(value);
      return Math.min(Math.max(year, min), max);
    }

    function uid() {
      return Math.random().toString(36).slice(2, 10);
    }

    function renderControls() {
      elements.birthYear.value = String(state.birthYear);
      elements.endYear.value = String(state.endYear);
      elements.collapseToggle.checked = state.collapse;
      elements.autoRenderToggle.checked = state.autoRender;

      elements.fixedEventList.innerHTML = fixedEventTemplates.map((template, index) => {
        const item = state.fixedEvents[index];
        return `
          ${index === 0 ? `
            <div class="event-table">
              <div class="event-head">
                <div>启用</div>
                <div>事件</div>
                <div>Emoji</div>
                <div>开始年</div>
                <div>结束年</div>
              </div>
          ` : ""}
              <div class="event-row ${item.enabled ? "is-active" : ""}" data-fixed-row="${index}">
                <label class="event-row-toggle">
                  <input type="checkbox" data-fixed-toggle="${index}" ${item.enabled ? "checked" : ""}>
                </label>
                <div class="event-row-name">
                  <span>${template.label}</span>
                </div>
                <div class="chip">${template.emoji}</div>
                <input type="number" min="${state.birthYear}" max="${state.endYear}" step="1" data-fixed-start="${index}" value="${item.startYear}">
                <input type="number" min="${state.birthYear}" max="${state.endYear}" step="1" data-fixed-end="${index}" value="${item.endYear}">
              </div>
          ${index === fixedEventTemplates.length - 1 ? `</div>` : ""}
        `;
      }).join("");

      elements.customEventList.innerHTML = state.customEvents.length
        ? `
          <div class="event-table">
            <div class="event-head custom">
              <div>Emoji</div>
              <div>开始年</div>
              <div>结束年</div>
              <div></div>
              <div></div>
            </div>
            ${state.customEvents.map((item) => `
              <div class="event-row custom">
                <input class="event-emoji-input" type="text" maxlength="24" value="${escapeAttribute(item.emoji)}" data-custom-emoji="${item.id}" placeholder="🐶">
                <input type="number" min="${state.birthYear}" max="${state.endYear}" step="1" data-custom-start="${item.id}" value="${item.startYear}">
                <input type="number" min="${state.birthYear}" max="${state.endYear}" step="1" data-custom-end="${item.id}" value="${item.endYear}">
                <div class="chip">${escapeHtml(item.emoji || "🙂")}</div>
                <button class="icon-button" type="button" data-remove-custom="${item.id}" aria-label="删除">✕</button>
              </div>
            `).join("")}
          </div>
        `
        : `<div class="empty">还没有自定义事件。点“新增一条”就可以加自己的 emoji。</div>`;
    }

    function renderEmojiBank() {
      elements.emojiBank.innerHTML = emojiSuggestions.map((emoji) => (
        `<button class="emoji-pill" type="button" data-emoji-pill="${escapeAttribute(emoji)}">${escapeHtml(emoji)}</button>`
      )).join("");
    }

    function growthEmoji(age) {
      if (age <= 1) return "👶";
      if (age <= 6) return "🧒";
      if (age <= 17) return "👧";
      if (age <= 25) return "🧑";
      return "👩";
    }

    function buildTimelineEntries() {
      const minYear = state.birthYear;
      const maxYear = state.endYear;
      const eventMap = new Map();

      for (let year = minYear; year <= maxYear; year += 1) {
        eventMap.set(year, [growthEmoji(year - minYear)]);
      }

      fixedEventTemplates.forEach((template, index) => {
        const item = state.fixedEvents[index];
        if (!item.enabled) return;
        const start = Math.min(item.startYear, item.endYear);
        const end = Math.max(item.startYear, item.endYear);
        for (let year = start; year <= end; year += 1) {
          eventMap.get(year).push(template.emoji);
        }
      });

      state.customEvents.forEach((item) => {
        const emoji = (item.emoji || "").trim();
        if (!emoji) return;
        const start = Math.min(item.startYear, item.endYear);
        const end = Math.max(item.startYear, item.endYear);
        for (let year = start; year <= end; year += 1) {
          eventMap.get(year).push(emoji);
        }
      });

      const flatEntries = [];
      for (let year = minYear; year <= maxYear; year += 1) {
        flatEntries.push({
          startYear: year,
          endYear: year,
          label: String(year),
          emojis: eventMap.get(year).join(" ")
        });
      }

      if (!state.collapse) {
        return flatEntries;
      }

      const collapsed = [];
      flatEntries.forEach((entry) => {
        const previous = collapsed[collapsed.length - 1];
        if (previous && previous.emojis === entry.emojis) {
          previous.endYear = entry.endYear;
          previous.label = `${previous.startYear}-${previous.endYear}`;
        } else {
          collapsed.push({ ...entry });
        }
      });
      return collapsed;
    }

    function timelineAsText(entries) {
      return entries.map((entry) => `${entry.label} ${entry.emojis}`).join("\n");
    }

    function renderTimeline() {
      const entries = buildTimelineEntries();
      if (!entries.length) {
        elements.timeline.innerHTML = `<div class="empty">先填写出生年和事件，再生成你的 emoji 人生轨迹。</div>`;
        return entries;
      }

      elements.timeline.innerHTML = entries.map((entry) => `
        <div class="timeline-row">
          <div class="timeline-year">${entry.label}</div>
          <div class="timeline-emojis">${escapeHtml(entry.emojis)}</div>
        </div>
      `).join("");

      return entries;
    }

    function renderAll() {
      enforceYearBounds();
      renderControls();
      renderEmojiBank();
      const entries = renderTimeline();
      saveState();
      elements.statusText.innerHTML = `${state.collapse ? "折叠视图" : "展开视图"}<br>${entries.length} 行`;
      return entries;
    }

    function enforceYearBounds() {
      if (state.endYear < state.birthYear) {
        state.endYear = state.birthYear;
      }

      state.fixedEvents.forEach((item) => {
        item.startYear = sanitizeRangeYear(item.startYear, state.birthYear, state.endYear);
        item.endYear = sanitizeRangeYear(item.endYear, state.birthYear, state.endYear);
      });

      state.customEvents.forEach((item) => {
        item.startYear = sanitizeRangeYear(item.startYear, state.birthYear, state.endYear);
        item.endYear = sanitizeRangeYear(item.endYear, state.birthYear, state.endYear);
      });
    }

    function maybeAutoRender() {
      if (state.autoRender) {
        renderAll();
      } else {
        saveState();
        elements.statusText.textContent = "配置已更新，点击“生成时间线”";
      }
    }

    function handleControlChange(event) {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;

      if (target.id === "birthYear") {
        state.birthYear = clampYear(target.value);
        if (state.endYear < state.birthYear) {
          state.endYear = state.birthYear;
        }
        maybeAutoRender();
        return;
      }

      if (target.id === "endYear") {
        state.endYear = Math.max(state.birthYear, clampYear(target.value));
        maybeAutoRender();
        return;
      }

      if (target.id === "collapseToggle") {
        state.collapse = target.checked;
        maybeAutoRender();
        return;
      }

      if (target.id === "autoRenderToggle") {
        state.autoRender = target.checked;
        saveState();
        elements.statusText.textContent = target.checked ? "自动刷新已开启" : "自动刷新已关闭";
        return;
      }

      if (target.dataset.fixedToggle !== undefined) {
        const index = Number(target.dataset.fixedToggle);
        state.fixedEvents[index].enabled = target.checked;
        maybeAutoRender();
        return;
      }

      if (target.dataset.fixedStart !== undefined) {
        const index = Number(target.dataset.fixedStart);
        state.fixedEvents[index].startYear = clampYear(target.value);
        maybeAutoRender();
        return;
      }

      if (target.dataset.fixedEnd !== undefined) {
        const index = Number(target.dataset.fixedEnd);
        state.fixedEvents[index].endYear = clampYear(target.value);
        maybeAutoRender();
        return;
      }

      if (target.dataset.customStart) {
        const item = state.customEvents.find((entry) => entry.id === target.dataset.customStart);
        if (item) {
          item.startYear = clampYear(target.value);
          maybeAutoRender();
        }
        return;
      }

      if (target.dataset.customEnd) {
        const item = state.customEvents.find((entry) => entry.id === target.dataset.customEnd);
        if (item) {
          item.endYear = clampYear(target.value);
          maybeAutoRender();
        }
        return;
      }

    }

    function handleControlInput(event) {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;

      if (target.dataset.customEmoji) {
        const item = state.customEvents.find((entry) => entry.id === target.dataset.customEmoji);
        if (item) {
          item.emoji = target.value;
          maybeAutoRender();
        }
      }
    }

    async function copyText(text, successMessage) {
      try {
        await navigator.clipboard.writeText(text);
        elements.statusText.innerHTML = `<span class="copied">${successMessage}</span>`;
      } catch (error) {
        elements.statusText.textContent = "复制失败，请检查浏览器权限";
      }
    }

    async function handleClick(event) {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;

      const fixedRow = target.closest("[data-fixed-row]");
      const clickedInteractive = target.closest("select, input, button, option");
      if (fixedRow && !clickedInteractive) {
        const index = Number(fixedRow.dataset.fixedRow);
        if (!Number.isNaN(index) && state.fixedEvents[index]) {
          state.fixedEvents[index].enabled = !state.fixedEvents[index].enabled;
          maybeAutoRender();
        }
        return;
      }

      if (target.id === "generateBtn") {
        renderAll();
        return;
      }

      if (target.id === "copyBtn") {
        const entries = buildTimelineEntries();
        await copyText(timelineAsText(entries), "纯文本已复制");
        return;
      }

      if (target.id === "exportBtn") {
        await exportTimelineAsImage(buildTimelineEntries());
        return;
      }

      if (target.id === "resetBtn") {
        state = defaultState();
        renderAll();
        elements.statusText.textContent = "已恢复默认配置";
        return;
      }

      if (target.id === "addCustomEventBtn") {
        state.customEvents.push({
          id: uid(),
          emoji: "✨",
          startYear: state.birthYear,
          endYear: state.birthYear
        });
        renderAll();
        return;
      }

      if (target.dataset.removeCustom) {
        state.customEvents = state.customEvents.filter((item) => item.id !== target.dataset.removeCustom);
        renderAll();
        return;
      }

      if (target.dataset.emojiPill) {
        await copyText(target.dataset.emojiPill, `${target.dataset.emojiPill} 已复制`);
      }
    }

    async function exportTimelineAsImage(entries) {
      if (!entries.length) {
        elements.statusText.textContent = "没有可导出的内容";
        return;
      }

      const canvas = elements.exportCanvas;
      const padding = 40;
      const rowHeight = 46;
      const width = 1080;
      const height = padding * 2 + 80 + entries.length * rowHeight;
      const ctx = canvas.getContext("2d");
      const ratio = Math.max(window.devicePixelRatio || 1, 2);

      canvas.width = width * ratio;
      canvas.height = height * ratio;
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

      ctx.fillStyle = "#f8f5ee";
      ctx.fillRect(0, 0, width, height);

      const gradient = ctx.createLinearGradient(0, 0, width, height);
      gradient.addColorStop(0, "rgba(255,255,255,0.85)");
      gradient.addColorStop(1, "rgba(240,232,217,0.92)");
      ctx.fillStyle = gradient;
      roundRect(ctx, 24, 24, width - 48, height - 48, 28);
      ctx.fill();

      ctx.fillStyle = "#222";
      ctx.font = '700 38px "Avenir Next", "PingFang SC", sans-serif';
      ctx.fillText("Emoji 人生轨迹", padding + 6, 76);

      ctx.fillStyle = "#6a6258";
      ctx.font = '500 22px "Avenir Next", "PingFang SC", sans-serif';
      ctx.fillText(state.collapse ? "折叠视图" : "展开视图", width - 180, 76);

      const startY = 130;
      entries.forEach((entry, index) => {
        const y = startY + index * rowHeight;
        ctx.fillStyle = "#1f1f1f";
        ctx.font = '800 30px "Avenir Next", "PingFang SC", sans-serif';
        ctx.fillText(entry.label, padding + 6, y);

        ctx.font = '400 31px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif';
        ctx.fillText(entry.emojis, 220, y);
      });

      const link = document.createElement("a");
      link.href = canvas.toDataURL("image/png");
      link.download = "emoji-life.png";
      link.click();
      elements.statusText.textContent = "结果区域已导出为图片";
    }

    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replaceAll("`", "&#96;");
    }

    renderAll();

    document.addEventListener("change", handleControlChange);
    document.addEventListener("input", handleControlInput);
    document.addEventListener("click", handleClick);
  </script>
</body>
</html>
